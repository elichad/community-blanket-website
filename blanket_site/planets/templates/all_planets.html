{% extends "base.html" %}

{% block title %}
All Planets
{% endblock %}

{% block content %}
<h1>All Planets</h1>


{% if all_planets %}
<table>
    <th>ID</th>
    <th>Image</th>
    <th>Creator</th>
    {% for planet in all_planets %}
    <tr>
        <td><a href="{{ planet.get_absolute_url }}">#{{ planet.id }}</a></td>
        <td><img src="{{ planet.thumbnail.url }}" alt="{{ planet.description }}" width="75px" height="75px"></td>
        <td>{{ planet.creator }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

{% endblock %}
