upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name 0.0.0.0;

    location /static/ {
        alias /staticfiles/;
    }

    location /media/ {
        alias /mediafiles/;
    }

    location / {
        uwsgi_pass  django;
        include     /etc/nginx/uwsgi_params;
    }
}